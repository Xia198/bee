<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九种蜜蜂属图鉴 | Nine Bees Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <!-- 真实背景图片 -->
        <div class="background-image"></div>
        
        <!-- 唯美渐变遮罩 -->
        <div class="gradient-bg"></div>
        
        <!-- 细腻纹理层 -->
        <div class="texture-overlay"></div>
        
        <!-- 森林剪影 -->
        <div class="forest-silhouette">
            <svg viewBox="0 0 1920 400" preserveAspectRatio="xMidYMax slice">
                <path d="M0 400 L0 250 Q100 200 200 240 Q350 160 500 220 Q650 140 800 200 Q950 120 1100 180 Q1250 100 1400 160 Q1550 80 1700 140 Q1850 60 1920 100 L1920 400 Z" fill="#2D5016"/>
                <path d="M0 400 L0 300 Q150 260 300 290 Q450 240 600 280 Q750 220 900 260 Q1050 200 1200 240 Q1350 180 1500 220 Q1650 160 1800 200 L1920 220 L1920 400 Z" fill="#3D6B1E"/>
                <path d="M0 400 L0 350 Q200 320 400 350 Q600 310 800 340 Q1000 300 1200 330 Q1400 290 1600 320 Q1800 280 1920 300 L1920 400 Z" fill="#4A7F23"/>
            </svg>
        </div>
        
        <!-- 装饰线条 -->
        <div class="decorative-line line-1"></div>
        <div class="decorative-line line-2"></div>
        <div class="decorative-line line-3"></div>
        
        <!-- 浮动光斑 -->
        <div class="light-spots">
            <div class="light-spot spot-1"></div>
            <div class="light-spot spot-2"></div>
            <div class="light-spot spot-3"></div>
            <div class="light-spot spot-4"></div>
        </div>
        
        <!-- 浮动的小蜜蜂 -->
        <div class="floating-bee bee-1">
            <svg viewBox="0 0 100 100" width="50" height="50">
                <ellipse cx="50" cy="55" rx="22" ry="28" fill="#C4A35A"/>
                <rect x="28" y="42" width="44" height="6" fill="#2D5016" opacity="0.7"/>
                <rect x="28" y="54" width="44" height="6" fill="#2D5016" opacity="0.7"/>
                <circle cx="50" cy="26" r="16" fill="#3D2914"/>
                <circle cx="44" cy="23" r="4" fill="white"/>
                <circle cx="56" cy="23" r="4" fill="white"/>
                <circle cx="44" cy="23" r="2" fill="#1a1a1a"/>
                <circle cx="56" cy="23" r="2" fill="#1a1a1a"/>
                <ellipse cx="28" cy="38" rx="16" ry="9" fill="rgba(255,255,255,0.6)" transform="rotate(-35 28 38)"/>
                <ellipse cx="72" cy="38" rx="16" ry="9" fill="rgba(255,255,255,0.6)" transform="rotate(35 72 38)"/>
            </svg>
        </div>
        <div class="floating-bee bee-2">
            <svg viewBox="0 0 100 100" width="38" height="38">
                <ellipse cx="50" cy="55" rx="22" ry="28" fill="#C4A35A"/>
                <rect x="28" y="42" width="44" height="6" fill="#2D5016" opacity="0.7"/>
                <rect x="28" y="54" width="44" height="6" fill="#2D5016" opacity="0.7"/>
                <circle cx="50" cy="26" r="16" fill="#3D2914"/>
                <ellipse cx="28" cy="38" rx="16" ry="9" fill="rgba(255,255,255,0.6)" transform="rotate(-35 28 38)"/>
                <ellipse cx="72" cy="38" rx="16" ry="9" fill="rgba(255,255,255,0.6)" transform="rotate(35 72 38)"/>
            </svg>
        </div>
    </div>

    <!-- 标题区域 -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="title-main">
                <span class="title-bee-icon">
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <ellipse cx="50" cy="55" rx="25" ry="30" fill="#C4A35A"/>
                        <rect x="25" y="40" width="50" height="8" fill="#2D5016" opacity="0.7"/>
                        <rect x="25" y="60" width="50" height="8" fill="#2D5016" opacity="0.7"/>
                        <circle cx="50" cy="25" r="18" fill="#3D2914"/>
                        <circle cx="43" cy="22" r="5" fill="white"/>
                        <circle cx="57" cy="22" r="5" fill="white"/>
                        <circle cx="43" cy="22" r="2.5" fill="#1a1a1a"/>
                        <circle cx="57" cy="22" r="2.5" fill="#1a1a1a"/>
                        <ellipse cx="25" cy="40" rx="20" ry="12" fill="rgba(255,255,255,0.6)" transform="rotate(-40 25 40)"/>
                        <ellipse cx="75" cy="40" rx="20" ry="12" fill="rgba(255,255,255,0.6)" transform="rotate(40 75 40)"/>
                        <ellipse cx="25" cy="55" rx="20" ry="12" fill="rgba(255,255,255,0.6)" transform="rotate(-50 25 55)"/>
                        <ellipse cx="75" cy="55" rx="20" ry="12" fill="rgba(255,255,255,0.6)" transform="rotate(50 75 55)"/>
                    </svg>
                </span>
                九种蜜蜂属图鉴
            </h1>
            <p class="subtitle">探索神奇的蜜蜂世界 · Nine Species of Apis</p>
            
            <!-- 入场蜜蜂触发器 -->
            <div class="entry-bee-container" id="entryBeeContainer">
                <div class="entry-bee" id="entryBee">
                    <img src="images/bee10.png" alt="点击进入">
                </div>
                <p class="entry-hint">点击蜜蜂进入</p>
            </div>
            
            <p class="hint">点击卡片了解更多</p>
        </div>
        <div class="scroll-indicator">
            <span>向下滑动</span>
            <div class="scroll-arrow">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 4v12m0 0l-6-6m6 6l6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </header>

    <!-- 蜜蜂卡片网格 -->
    <main class="gallery">
        <div class="gallery-grid" id="beeGrid">
            <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div class="modal" id="beeModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容将动态填充 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>课程拓展作业 · 2026</p>
            <p class="footer-bee">
                <svg viewBox="0 0 100 100" width="30" height="30">
                    <ellipse cx="50" cy="55" rx="20" ry="25" fill="#F4A020"/>
                    <rect x="30" y="45" width="40" height="6" fill="#2D2D2D"/>
                    <rect x="30" y="58" width="40" height="6" fill="#2D2D2D"/>
                    <circle cx="50" cy="28" r="14" fill="#2D2D2D"/>
                </svg>
            </p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
