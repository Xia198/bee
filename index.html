<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九种蜜蜂属图鉴 | Nine Bees Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="hexagon hex-1"></div>
        <div class="hexagon hex-2"></div>
        <div class="hexagon hex-3"></div>
        <div class="hexagon hex-4"></div>
        <div class="hexagon hex-5"></div>
        <div class="hexagon hex-6"></div>
        <div class="floating-bee bee-1">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <ellipse cx="50" cy="55" rx="25" ry="30" fill="#F4A020"/>
                <ellipse cx="50" cy="55" rx="25" ry="30" fill="url(#stripes)" opacity="0.8"/>
                <circle cx="50" cy="25" r="18" fill="#2D2D2D"/>
                <circle cx="43" cy="22" r="5" fill="white"/>
                <circle cx="57" cy="22" r="5" fill="white"/>
                <circle cx="43" cy="22" r="2.5" fill="#2D2D2D"/>
                <circle cx="57" cy="22" r="2.5" fill="#2D2D2D"/>
                <ellipse cx="30" cy="35" rx="18" ry="10" fill="#E8E8E8" opacity="0.7" transform="rotate(-30 30 35)"/>
                <ellipse cx="70" cy="35" rx="18" ry="10" fill="#E8E8E8" opacity="0.7" transform="rotate(30 70 35)"/>
                <defs>
                    <pattern id="stripes" patternUnits="userSpaceOnUse" width="10" height="10">
                        <rect width="10" height="5" fill="#2D2D2D"/>
                    </pattern>
                </defs>
            </svg>
        </div>
        <div class="floating-bee bee-2">
            <svg viewBox="0 0 100 100" width="45" height="45">
                <ellipse cx="50" cy="55" rx="25" ry="30" fill="#F4A020"/>
                <circle cx="50" cy="25" r="18" fill="#2D2D2D"/>
                <ellipse cx="30" cy="35" rx="18" ry="10" fill="#E8E8E8" opacity="0.7" transform="rotate(-30 30 35)"/>
                <ellipse cx="70" cy="35" rx="18" ry="10" fill="#E8E8E8" opacity="0.7" transform="rotate(30 70 35)"/>
            </svg>
        </div>
    </div>

    <!-- 标题区域 -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="title-main">
                <span class="title-bee-icon">
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <ellipse cx="50" cy="55" rx="25" ry="30" fill="#F4A020"/>
                        <rect x="25" y="40" width="50" height="8" fill="#2D2D2D"/>
                        <rect x="25" y="60" width="50" height="8" fill="#2D2D2D"/>
                        <circle cx="50" cy="25" r="18" fill="#2D2D2D"/>
                        <circle cx="43" cy="22" r="5" fill="white"/>
                        <circle cx="57" cy="22" r="5" fill="white"/>
                        <circle cx="43" cy="22" r="2.5" fill="#2D2D2D"/>
                        <circle cx="57" cy="22" r="2.5" fill="#2D2D2D"/>
                        <ellipse cx="25" cy="40" rx="20" ry="12" fill="#E8E8E8" opacity="0.8" transform="rotate(-40 25 40)"/>
                        <ellipse cx="75" cy="40" rx="20" ry="12" fill="#E8E8E8" opacity="0.8" transform="rotate(40 75 40)"/>
                        <ellipse cx="25" cy="55" rx="20" ry="12" fill="#E8E8E8" opacity="0.8" transform="rotate(-50 25 55)"/>
                        <ellipse cx="75" cy="55" rx="20" ry="12" fill="#E8E8E8" opacity="0.8" transform="rotate(50 75 55)"/>
                        <path d="M40 85 Q50 95 60 85" stroke="#2D2D2D" stroke-width="3" fill="none"/>
                    </svg>
                </span>
                九种蜜蜂属图鉴
            </h1>
            <p class="subtitle">探索神奇的蜜蜂世界 · Nine Species of Apis</p>
            <p class="hint">点击卡片了解更多</p>
        </div>
        <div class="scroll-indicator">
            <span>向下滑动</span>
            <div class="scroll-arrow">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 4v12m0 0l-6-6m6 6l6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </header>

    <!-- 蜜蜂卡片网格 -->
    <main class="gallery">
        <div class="gallery-grid" id="beeGrid">
            <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div class="modal" id="beeModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容将动态填充 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>课程拓展作业 · 2026</p>
            <p class="footer-bee">
                <svg viewBox="0 0 100 100" width="30" height="30">
                    <ellipse cx="50" cy="55" rx="20" ry="25" fill="#F4A020"/>
                    <rect x="30" y="45" width="40" height="6" fill="#2D2D2D"/>
                    <rect x="30" y="58" width="40" height="6" fill="#2D2D2D"/>
                    <circle cx="50" cy="28" r="14" fill="#2D2D2D"/>
                </svg>
            </p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
